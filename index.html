<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fumisaki Portal</title>
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="utilities.css">
    <link rel="stylesheet" href="effects.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2>Welcome</h2>
            <p>กรุณาเข้าสู่ระบบ</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" required>
                    <label>Username</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required>
                    <label>Password</label>
                </div>
                
                <button type="submit" class="login-btn" disabled>Login</button>
                
                <div class="login-footer">
                    <button type="button" onclick="trollUser()" class="troll-btn">← ไม่อยากเข้าแล้ว กดออกตรงนี้</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.querySelector('.login-btn');
        const loginForm = document.getElementById('loginForm');

        // 1. ระบบตรวจจับการพิมพ์: ถ้ากรอกไม่ครบ ปุ่มจะเป็นสีเทากดไม่ได้
        function checkInputs() {
            if (usernameInput.value.trim() !== '' && passwordInput.value.trim() !== '') {
                loginBtn.classList.add('active');
                loginBtn.disabled = false;
            } else {
                loginBtn.classList.remove('active');
                loginBtn.disabled = true;
            }
        }

        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);

        // 2. ระบบตรวจสอบรหัสผ่าน (Validation)
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const user = usernameInput.value;
            const pass = passwordInput.value;

            // ตั้งรหัสผ่านที่นี่ (ตัวอย่าง: admin / 1234)
            if (user === "admin" && pass === "1234") {
                alert("เข้าสู่ระบบสำเร็จ!");
                window.location.href = "home.html";
            } else {
                alert("รหัสผ่านไม่ถูกต้อง ลองใหม่อีกครั้ง");
                passwordInput.value = "";
                checkInputs();
            }
        });

        // 3. ปุ่มกวนประสาท (Troll Button)
        function trollUser() {
            alert("อยากออกจริงๆเหรอ? งั้นไปเลยยยยยยยยยยยยย");
            window.location.href = "https://www.google.com";
        }
    </script>
    <script src="enterprise.js"></script>
</body>
</html>
